<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 19: Asymmetric — bars build up left to right then abruptly hit the red block at the end, like getting cut off mid-sentence -->
  <defs>
    <linearGradient id="g19" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <rect x="40" y="40" width="432" height="432" rx="96" fill="#09090b"/>
    <!-- Waveform building from left -->
    <rect x="80" y="240" width="32" height="32" rx="16" fill="url(#g19)"/>
    <rect x="124" y="220" width="32" height="72" rx="16" fill="url(#g19)"/>
    <rect x="168" y="192" width="32" height="128" rx="16" fill="url(#g19)"/>
    <rect x="212" y="160" width="32" height="192" rx="16" fill="url(#g19)"/>
    <rect x="256" y="136" width="32" height="240" rx="16" fill="url(#g19)"/>
    <rect x="300" y="152" width="32" height="208" rx="16" fill="url(#g19)"/>
    <!-- Red block slams the end -->
    <rect x="352" y="148" width="108" height="216" rx="20" fill="#ef4444"/>
  </g>
</svg>
