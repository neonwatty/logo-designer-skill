<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 35: Ben-Day halftone dots on red bg, beefier bars, pink HAL eye -->
  <defs>
    <radialGradient id="hal35" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="55%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <pattern id="dots35" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="4" fill="#B71C1C" opacity="0.25"/>
    </pattern>
  </defs>
  <g id="icon">
    <!-- Drop shadow -->
    <rect x="50" y="50" width="432" height="432" rx="80" fill="#1a1a1a"/>
    <!-- Red panel -->
    <rect x="36" y="36" width="432" height="432" rx="80" fill="#E53935" stroke="#1a1a1a" stroke-width="6"/>
    <!-- Halftone dots overlay -->
    <rect x="36" y="36" width="432" height="432" rx="80" fill="url(#dots35)"/>
    <!-- Yellow bars left — 2 bars, wider -->
    <rect x="76" y="196" width="44" height="120" rx="12" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="134" y="148" width="44" height="216" rx="12" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <!-- HAL eye -->
    <circle cx="252" cy="256" r="76" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="4"/>
    <circle cx="252" cy="256" r="62" fill="#1a1a1a"/>
    <circle cx="252" cy="256" r="48" fill="url(#hal35)"/>
    <!-- Highlights -->
    <circle cx="236" cy="240" r="11" fill="#FFFEF0" opacity="0.8"/>
    <circle cx="260" cy="262" r="5" fill="#FFFEF0" opacity="0.4"/>
    <!-- Yellow bars right — 2 bars, wider -->
    <rect x="330" y="148" width="44" height="216" rx="12" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="388" y="196" width="44" height="120" rx="12" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
  </g>
</svg>
