<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 36: Bolder shadow (yellow), 3 thick bars per side, pink HAL eye, halftone -->
  <defs>
    <radialGradient id="hal36" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="55%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <pattern id="dots36" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="3.5" fill="#B71C1C" opacity="0.2"/>
    </pattern>
  </defs>
  <g id="icon">
    <!-- Yellow bold drop shadow -->
    <rect x="52" y="52" width="432" height="432" rx="80" fill="#FFD600"/>
    <!-- Red panel -->
    <rect x="36" y="36" width="432" height="432" rx="80" fill="#E53935" stroke="#1a1a1a" stroke-width="6"/>
    <!-- Halftone dots -->
    <rect x="36" y="36" width="432" height="432" rx="80" fill="url(#dots36)"/>
    <!-- Yellow bars left — 3 thick bars -->
    <rect x="66" y="232" width="28" height="48" rx="8" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="104" y="192" width="28" height="128" rx="8" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="142" y="152" width="28" height="208" rx="8" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <!-- HAL eye -->
    <circle cx="252" cy="256" r="72" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="4"/>
    <circle cx="252" cy="256" r="58" fill="#1a1a1a"/>
    <circle cx="252" cy="256" r="44" fill="url(#hal36)"/>
    <!-- Highlights -->
    <circle cx="238" cy="244" r="10" fill="#FFFEF0" opacity="0.8"/>
    <circle cx="258" cy="260" r="4" fill="#FFFEF0" opacity="0.4"/>
    <!-- Yellow bars right — 3 thick bars -->
    <rect x="338" y="152" width="28" height="208" rx="8" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="376" y="192" width="28" height="128" rx="8" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="414" y="232" width="28" height="48" rx="8" fill="#FFD600" stroke="#1a1a1a" stroke-width="4"/>
  </g>
</svg>
