    <linearGradient id="g20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <rect x="40" y="40" width="432" height="432" rx="96" fill="#09090b"/>
    <!-- Left bars — tall, tapering down -->
    <rect x="80" y="156" width="32" height="200" rx="16" fill="url(#g20)"/>
    <rect x="124" y="176" width="32" height="160" rx="16" fill="url(#g20)"/>
    <rect x="168" y="204" width="32" height="104" rx="16" fill="url(#g20)"/>
    <!-- Red block center -->
    <rect x="216" y="216" width="80" height="80" rx="16" fill="#ef4444"/>
    <!-- Right bars — tapering back up -->
    <rect x="312" y="204" width="32" height="104" rx="16" fill="url(#g20)"/>
    <rect x="356" y="176" width="32" height="160" rx="16" fill="url(#g20)"/>
