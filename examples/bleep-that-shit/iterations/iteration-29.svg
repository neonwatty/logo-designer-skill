<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 29: Comic book — off-white bg, action burst lines around the red eye, halftone-inspired dots -->
  <defs>
    <radialGradient id="hal29" cx="42%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="50%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Drop shadow -->
    <rect x="48" y="48" width="432" height="432" rx="80" fill="#1a1a1a"/>
    <!-- Main panel -->
    <rect x="36" y="36" width="432" height="432" rx="80" fill="#FFFEF0" stroke="#1a1a1a" stroke-width="6"/>
    <!-- Action burst lines radiating from center -->
    <line x1="252" y1="120" x2="252" y2="156" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
    <line x1="252" y1="348" x2="252" y2="384" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
    <line x1="152" y1="180" x2="172" y2="200" stroke="#FFD600" stroke-width="5" stroke-linecap="round"/>
    <line x1="332" y1="304" x2="352" y2="324" stroke="#FFD600" stroke-width="5" stroke-linecap="round"/>
    <line x1="152" y1="324" x2="172" y2="304" stroke="#FFD600" stroke-width="5" stroke-linecap="round"/>
    <line x1="332" y1="200" x2="352" y2="180" stroke="#FFD600" stroke-width="5" stroke-linecap="round"/>
    <!-- Bars left -->
    <rect x="72" y="200" width="38" height="104" rx="10" fill="#1E88E5" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="124" y="152" width="38" height="200" rx="10" fill="#1E88E5" stroke="#1a1a1a" stroke-width="4"/>
    <!-- HAL eye — comic style -->
    <circle cx="252" cy="252" r="68" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="252" cy="252" r="54" fill="url(#hal29)"/>
    <!-- Comic highlight -->
    <circle cx="236" cy="236" r="12" fill="#FFFEF0" opacity="0.8"/>
    <circle cx="262" cy="258" r="5" fill="#FFFEF0" opacity="0.5"/>
    <!-- Bars right -->
    <rect x="340" y="152" width="38" height="200" rx="10" fill="#1E88E5" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="392" y="200" width="38" height="104" rx="10" fill="#1E88E5" stroke="#1a1a1a" stroke-width="4"/>
  </g>
</svg>
