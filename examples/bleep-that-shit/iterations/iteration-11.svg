<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 11: Like 8 but more bars (4 left, 3 right) for a fuller waveform feel -->
  <defs>
    <linearGradient id="g11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <rect x="40" y="40" width="432" height="432" rx="96" fill="#09090b"/>
    <!-- Normal bars left -->
    <rect x="80" y="216" width="32" height="80" rx="16" fill="url(#g11)"/>
    <rect x="124" y="168" width="32" height="176" rx="16" fill="url(#g11)"/>
    <rect x="168" y="140" width="32" height="232" rx="16" fill="url(#g11)"/>
    <rect x="212" y="176" width="32" height="160" rx="16" fill="url(#g11)"/>
    <!-- Red block -->
    <rect x="260" y="212" width="72" height="88" rx="16" fill="#ef4444"/>
    <!-- Normal bars right -->
    <rect x="348" y="160" width="32" height="192" rx="16" fill="url(#g11)"/>
    <rect x="392" y="188" width="32" height="136" rx="16" fill="url(#g11)"/>
  </g>
</svg>
