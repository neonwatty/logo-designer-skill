<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 5: Freestanding waveform (no background), censor bar with redaction lines (like a classified doc) -->
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <!-- Full waveform -->
    <rect x="56" y="216" width="20" height="80" rx="10" fill="url(#g5)"/>
    <rect x="88" y="166" width="20" height="180" rx="10" fill="url(#g5)"/>
    <rect x="120" y="196" width="20" height="120" rx="10" fill="url(#g5)"/>
    <rect x="152" y="136" width="20" height="240" rx="10" fill="url(#g5)"/>
    <rect x="184" y="176" width="20" height="160" rx="10" fill="url(#g5)"/>
    <rect x="216" y="146" width="20" height="220" rx="10" fill="url(#g5)"/>
    <rect x="248" y="186" width="20" height="140" rx="10" fill="url(#g5)"/>
    <rect x="280" y="156" width="20" height="200" rx="10" fill="url(#g5)"/>
    <rect x="312" y="186" width="20" height="140" rx="10" fill="url(#g5)"/>
    <rect x="344" y="146" width="20" height="220" rx="10" fill="url(#g5)"/>
    <rect x="376" y="176" width="20" height="160" rx="10" fill="url(#g5)"/>
    <rect x="408" y="196" width="20" height="120" rx="10" fill="url(#g5)"/>
    <rect x="440" y="216" width="20" height="80" rx="10" fill="url(#g5)"/>
    <!-- Censor bar — solid black, with horizontal redaction lines -->
    <rect x="168" y="222" width="176" height="68" rx="8" fill="#09090b" opacity="0.94"/>
    <line x1="184" y1="240" x2="328" y2="240" stroke="#71717a" stroke-width="4" stroke-linecap="round"/>
    <line x1="184" y1="256" x2="328" y2="256" stroke="#71717a" stroke-width="4" stroke-linecap="round"/>
    <line x1="184" y1="272" x2="300" y2="272" stroke="#71717a" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
