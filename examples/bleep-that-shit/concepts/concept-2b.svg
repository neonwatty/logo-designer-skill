<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Concept 2b: Bleep Waveform — all gradient bars, bleeped section knocked out/dark -->
  <defs>
    <linearGradient id="grad2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <!-- Rounded square background -->
    <rect x="40" y="40" width="432" height="432" rx="96" fill="#09090b"/>
    <!-- Waveform bars — gradient -->
    <rect x="72" y="216" width="18" height="80" rx="9" fill="url(#grad2b)"/>
    <rect x="100" y="176" width="18" height="160" rx="9" fill="url(#grad2b)"/>
    <rect x="128" y="196" width="18" height="120" rx="9" fill="url(#grad2b)"/>
    <rect x="156" y="156" width="18" height="200" rx="9" fill="url(#grad2b)"/>
    <!-- Bleeped section — dark bars (knocked out) -->
    <rect x="190" y="236" width="18" height="40" rx="9" fill="#27272a"/>
    <rect x="218" y="236" width="18" height="40" rx="9" fill="#27272a"/>
    <rect x="246" y="236" width="18" height="40" rx="9" fill="#27272a"/>
    <rect x="274" y="236" width="18" height="40" rx="9" fill="#27272a"/>
    <rect x="302" y="236" width="18" height="40" rx="9" fill="#27272a"/>
    <!-- Waveform bars — gradient resumed -->
    <rect x="336" y="166" width="18" height="180" rx="9" fill="url(#grad2b)"/>
    <rect x="364" y="186" width="18" height="140" rx="9" fill="url(#grad2b)"/>
    <rect x="392" y="196" width="18" height="120" rx="9" fill="url(#grad2b)"/>
    <rect x="420" y="206" width="18" height="100" rx="9" fill="url(#grad2b)"/>
  </g>
</svg>
