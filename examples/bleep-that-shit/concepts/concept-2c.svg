<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Concept 2c: Bleep Waveform — no background, freestanding waveform, bleeped section has a censor bar across it -->
  <defs>
    <linearGradient id="grad2c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <!-- Full waveform in gradient -->
    <rect x="56" y="216" width="20" height="80" rx="10" fill="url(#grad2c)"/>
    <rect x="88" y="166" width="20" height="180" rx="10" fill="url(#grad2c)"/>
    <rect x="120" y="196" width="20" height="120" rx="10" fill="url(#grad2c)"/>
    <rect x="152" y="136" width="20" height="240" rx="10" fill="url(#grad2c)"/>
    <rect x="184" y="176" width="20" height="160" rx="10" fill="url(#grad2c)"/>
    <rect x="216" y="146" width="20" height="220" rx="10" fill="url(#grad2c)"/>
    <rect x="248" y="186" width="20" height="140" rx="10" fill="url(#grad2c)"/>
    <rect x="280" y="156" width="20" height="200" rx="10" fill="url(#grad2c)"/>
    <rect x="312" y="186" width="20" height="140" rx="10" fill="url(#grad2c)"/>
    <rect x="344" y="146" width="20" height="220" rx="10" fill="url(#grad2c)"/>
    <rect x="376" y="176" width="20" height="160" rx="10" fill="url(#grad2c)"/>
    <rect x="408" y="196" width="20" height="120" rx="10" fill="url(#grad2c)"/>
    <rect x="440" y="216" width="20" height="80" rx="10" fill="url(#grad2c)"/>
    <!-- Censor bar overlaid across middle section -->
    <rect x="170" y="226" width="172" height="60" rx="8" fill="#09090b" opacity="0.92"/>
    <!-- BLEEP text on bar -->
    <text x="256" y="266" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="4" fill="#ef4444">BLEEP</text>
  </g>
</svg>
